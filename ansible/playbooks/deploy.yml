---
# Main deployment playbook for Stock Portfolio Manager
# Usage: ansible-playbook -i ansible/inventory/hosts.ini ansible/playbooks/deploy.yml \
#          --extra-vars "image_tag=latest" --ask-vault-pass

- name: Deploy Stock Portfolio Manager
  hosts: app_servers
  become: yes
  vars_files:
    - ../vars/secrets.yml     # Ansible Vault encrypted secrets

  vars:
    image_tag: "latest"       # overridden by Jenkins --extra-vars "image_tag=${BUILD_NUMBER}"
    docker_image: "chaitanya020403/stock-portfolio-manager:{{ image_tag }}"

  roles:
    - role: ../roles/mysql
    - role: ../roles/app_server
    - role: ../roles/elk_stack
    - role: ../roles/kubernetes
