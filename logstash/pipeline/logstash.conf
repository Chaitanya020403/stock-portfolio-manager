input {
  # Read from log file (mounted volume from app container)
  file {
    path => "/app/logs/stockportfolio*.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => plain { charset => "UTF-8" }
    tags => ["stockportfolio", "file"]
  }

  # Also accept TCP input (for direct log shipping)
  tcp {
    port => 5000
    codec => plain
    tags => ["stockportfolio", "tcp"]
  }
}

filter {
  # Parse Spring Boot log format:
  # 2026-05-09 22:08:42 [main] INFO  c.s.app.StockPortfolioApplication - Started
  grok {
    match => {
      "message" => "%{TIMESTAMP_ISO8601:log_timestamp} \[%{DATA:thread}\] %{LOGLEVEL:level}\s+%{DATA:logger} - %{GREEDYDATA:log_message}"
    }
    overwrite => ["message"]
  }

  # Parse the timestamp into @timestamp
  date {
    match => ["log_timestamp", "yyyy-MM-dd HH:mm:ss"]
    target => "@timestamp"
    remove_field => ["log_timestamp"]
  }

  # Tag errors and warnings for easy filtering in Kibana
  if [level] == "ERROR" {
    mutate { add_tag => ["error"] }
  }
  if [level] == "WARN" {
    mutate { add_tag => ["warning"] }
  }

  # Tag specific service activity for Kibana dashboards
  if [logger] =~ "AuthService" or [logger] =~ "AuthController" {
    mutate { add_tag => ["auth_activity"] }
  }
  if [logger] =~ "HoldingService" {
    mutate { add_tag => ["holding_activity"] }
  }
  if [logger] =~ "MarketService" {
    mutate { add_tag => ["market_activity"] }
  }
  if [logger] =~ "PortfolioService" {
    mutate { add_tag => ["portfolio_activity"] }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "stockportfolio-logs-%{+YYYY.MM.dd}"
  }

  # Optional: stdout for debugging
  # stdout { codec => rubydebug }
}
