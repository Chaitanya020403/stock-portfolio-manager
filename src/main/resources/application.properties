# Server
server.port=8081
spring.application.name=stock-portfolio-manager

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/stockportfolio
spring.datasource.username=${DB_USERNAME:stockuser}
spring.datasource.password=${DB_PASSWORD:Stock@1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Thymeleaf
spring.thymeleaf.cache=false

# JWT
jwt.secret=${JWT_SECRET:StockPortfolioManagerSuperSecretKeyForJWTTokenGeneration2024}
jwt.expiration=86400000

# Finnhub
finnhub.api.key=${FINNHUB_API_KEY:demo}
finnhub.base.url=https://finnhub.io/api/v1

# Logging
logging.level.com.stockportfolio=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
